<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0d2e"/>
    </linearGradient>
    <radialGradient id="iconbg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g stroke="#312e81" stroke-opacity="0.35" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Icon on the left -->
  <g transform="translate(120, 160)">
    <rect x="0" y="0" width="320" height="320" rx="60" ry="60" fill="url(#iconbg)"/>

    <g fill="none" stroke="#f59e0b" stroke-opacity="0.28" transform="translate(160, 160)">
      <circle r="115" stroke-width="2.5"/>
      <circle r="95" stroke-width="2.5"/>
      <circle r="75" stroke-width="2.5"/>
      <circle r="55" stroke-width="2.5"/>
      <circle r="35" stroke-width="2.5"/>
    </g>

    <g fill="#f59e0b" filter="url(#glow)" transform="translate(160, 160)">
      <circle cx="0" cy="-115" r="13"/>
      <circle cx="100" cy="-58" r="13"/>
      <circle cx="100" cy="58" r="13"/>
      <circle cx="0" cy="115" r="13"/>
      <circle cx="-100" cy="58" r="13"/>
      <circle cx="-100" cy="-58" r="13"/>
    </g>

    <g stroke="#f59e0b" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round" transform="translate(160, 160)">
      <line x1="0" y1="0" x2="0" y2="-115"/>
      <line x1="0" y1="0" x2="100" y2="-58"/>
      <line x1="0" y1="0" x2="100" y2="58"/>
      <line x1="0" y1="0" x2="0" y2="115"/>
      <line x1="0" y1="0" x2="-100" y2="58"/>
      <line x1="0" y1="0" x2="-100" y2="-58"/>
    </g>

    <circle cx="160" cy="160" r="20" fill="#fef3c7"/>
    <circle cx="160" cy="160" r="20" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="243" cy="51" r="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Text on the right -->
  <g transform="translate(510, 220)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#fef3c7">Ensembra</text>
    <text x="0" y="60" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#c7d2fe" opacity="0.95">Multi-agent orchestrator for Claude Code</text>
    <text x="0" y="120" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a5b4fc" opacity="0.85">6 deliberators + scribe · 5-phase pipeline · Reuse-First policy</text>

    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="110" height="36" rx="18" ry="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <text x="55" y="24" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#f59e0b" text-anchor="middle">v0.1.0</text>

      <rect x="125" y="0" width="80" height="36" rx="18" ry="18" fill="none" stroke="#c7d2fe" stroke-width="2"/>
      <text x="165" y="24" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#c7d2fe" text-anchor="middle">MIT</text>
    </g>
  </g>
</svg>
