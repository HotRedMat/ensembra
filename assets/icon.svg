<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- 5 concentric phase rings -->
  <g fill="none" stroke="#f59e0b" stroke-opacity="0.28">
    <circle cx="128" cy="128" r="92" stroke-width="2"/>
    <circle cx="128" cy="128" r="76" stroke-width="2"/>
    <circle cx="128" cy="128" r="60" stroke-width="2"/>
    <circle cx="128" cy="128" r="44" stroke-width="2"/>
    <circle cx="128" cy="128" r="28" stroke-width="2"/>
  </g>

  <!-- 6 performer nodes around the conductor -->
  <g fill="#f59e0b" filter="url(#glow)">
    <!-- top -->
    <circle cx="128" cy="36" r="10"/>
    <!-- upper right -->
    <circle cx="208" cy="82" r="10"/>
    <!-- lower right -->
    <circle cx="208" cy="174" r="10"/>
    <!-- bottom -->
    <circle cx="128" cy="220" r="10"/>
    <!-- lower left -->
    <circle cx="48" cy="174" r="10"/>
    <!-- upper left -->
    <circle cx="48" cy="82" r="10"/>
  </g>

  <!-- Deliberation lines from center to performers -->
  <g stroke="#f59e0b" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round">
    <line x1="128" y1="128" x2="128" y2="36"/>
    <line x1="128" y1="128" x2="208" y2="82"/>
    <line x1="128" y1="128" x2="208" y2="174"/>
    <line x1="128" y1="128" x2="128" y2="220"/>
    <line x1="128" y1="128" x2="48" y2="174"/>
    <line x1="128" y1="128" x2="48" y2="82"/>
  </g>

  <!-- Conductor at center -->
  <circle cx="128" cy="128" r="16" fill="#fef3c7"/>
  <circle cx="128" cy="128" r="16" fill="none" stroke="#f59e0b" stroke-width="2"/>

  <!-- Scribe dot (offset, smaller) -->
  <circle cx="195" cy="40" r="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
</svg>
