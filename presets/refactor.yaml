name: refactor
description: 리팩토링. architect+developer+devils-advocate+qa 참여, R2 반론 필수, architect+devils 감사.

performers:
  - architect
  - developer
  - devils-advocate
  - qa

rounds: [R1, R2, synthesis]

deep_scan:
  forced: [1, 2, 3, 4, 9, 10]
  optional: [5, 6, 7]  # 테스트·히스토리·의존성 중요, 설정은 off

phase2:
  execute: true

phase3:
  audit: true
  auditors: [architect, devils-advocate]  # 설계 일관성·과잉 추상화 감시

phase4:
  document: true
  generate:
    task_report: true
    design_doc: true    # 리팩토링 결과 설계서 업데이트
    request_spec: true  # 리팩토링 동기 정식화
