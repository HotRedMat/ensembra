name: source-analysis
description: 소스 코드 분석 (읽기 전용). architect+security+developer 참여, R1→Synthesis, 분석 리포트만 생성.

performers:
  - architect
  - security
  - developer

rounds: [R1, synthesis]

deep_scan:
  forced: [1, 2, 3, 4, 9, 10]
  optional: [5, 6]  # 테스트·히스토리 포함

phase2:
  execute: false  # 읽기 전용

phase3:
  audit: false  # 수정이 없으므로 감사 불필요

phase4:
  document: true
  generate:
    task_report: true  # 분석 결과 기록
    design_doc: false
    request_spec: false
