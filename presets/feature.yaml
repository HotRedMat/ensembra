name: feature
description: 신규 기능 개발. 전 Performer 참여 토론, 전원 감사, 문서 3종 생성.

performers:
  - planner
  - architect
  - developer
  - security
  - qa
  - devils-advocate

rounds: [R1, R2, synthesis]

deep_scan:
  forced: [1, 2, 3, 4, 9, 10]
  optional: [5, 6, 7, 8]  # 전부 on (기본값)

phase2:
  execute: true

phase3:
  audit: true
  # v0.8.0+: 전문 감사자 → final-auditor 2단계. 순서 보존 필수 (final-auditor 는 항상 마지막).
  # planner 는 v0.8.0 부터 Phase 3 감사에서 제외 — final-auditor 가 요구사항 충족 여부 종합.
  auditors: [architect, developer, security, qa, devils-advocate, final-auditor]
  final_auditor: final-auditor  # 만장일치 판정자. CONTRACT.md §11.3

phase4:
  document: true
  generate:
    task_report: true    # 강제
    design_doc: true     # feature 만
    request_spec: true   # feature 만
