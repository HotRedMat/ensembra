name: feature
description: 신규 기능 개발. 전 Performer 참여 토론, 전원 감사, 문서 3종 생성.

performers:
  - planner
  - architect
  - developer
  - security
  - qa
  - devils-advocate

rounds: [R1, R2, synthesis]

deep_scan:
  forced: [1, 2, 3, 4, 9, 10]
