name: ops
description: 운영 경량 작업 (v0.9.0+). 로그 수정·설정 변경·문서 패치 등 영향 반경 작은 수정. planner+qa+security 3명, R1 only. feature 프리셋의 ~15% 토큰 소모.

performers:
  - planner
  - qa
  - security

rounds: [R1, synthesis]

deep_scan:
  forced: [1, 2, 9]   # 구조·키워드 역추적·공통 모듈 인벤토리 (최소 3항목)
  optional: []         # 선택 4항목은 off

phase2:
  execute: true

phase3:
  audit: true
  # 운영 작업이므로 security + final-auditor 로 최소 안전 유지
  auditors: [security, final-auditor]
  final_auditor: final-auditor

phase4:
  document: true
  generate:
    task_report: true    # 강제
    design_doc: false    # 설계서 생성 안 함 (경량)
    request_spec: false  # 요청서 생성 안 함 (경량)
